<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9E28D7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c060f0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ede0fa;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#9E28D7" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="50" cy="50" r="46" fill="url(#circleGrad)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#9E28D7" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#9E28D7" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Cancer Ribbon (simplified elegant ribbon shape) -->
  <!-- Left ribbon loop -->
  <path d="M50,35 C44,25 32,24 32,34 C32,44 50,52 50,52 C50,52 32,60 32,70 C32,76 38,76 42,72 L50,62" fill="url(#ribbonGrad)" opacity="0.95"/>
  <!-- Right ribbon loop -->
  <path d="M50,35 C56,25 68,24 68,34 C68,44 50,52 50,52 C50,52 68,60 68,70 C68,76 62,76 58,72 L50,62" fill="url(#ribbonGrad)" opacity="0.85"/>
  <!-- Center knot -->
  <ellipse cx="50" cy="52" rx="5" ry="4" fill="#7a10b8"/>

  <!-- Wordmark -->
  <!-- HOPE large bold -->
  <text x="108" y="42" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#2c4964" letter-spacing="2">HOPE</text>

  <!-- Accent underline bar -->
  <rect x="108" y="47" width="160" height="3" rx="1.5" fill="#9E28D7"/>

  <!-- Subtitle line 1 -->
  <text x="109" y="65" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="500" fill="#9E28D7" letter-spacing="0.5">CENTRE FOR CANCER SURGERY</text>
  <!-- Subtitle line 2 -->
  <text x="109" y="80" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="500" fill="#2c4964" letter-spacing="0.5">&amp; RESEARCH</text>

  <!-- Tagline small -->
  <text x="109" y="94" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="400" fill="#9E28D7" letter-spacing="1.5" opacity="0.8">FIGHT CANCER TOGETHER</text>
</svg>
